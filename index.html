<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shane Homes – Project Status | Vista Geomatics</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d10;
  --surface:#111520;
  --surface2:#151c25;
  --surface3:#1a2230;
  --border:#1e2a38;
  --border2:#253347;
  --text:#dde6f0;
  --muted:#4a5d72;
  --soft:#7a90a8;
  --teal:#2e8fa3;
  --teal-dim:#16444f;
  --teal-bg:#091418;
  --teal-light:#3ab0c8;
  --green:#3db87a;
  --green-dim:#0e4830;
  --green-bg:#061a10;
  --amber:#e8a83d;
  --amber-dim:#6b4a10;
  --amber-bg:#1a1005;
  --red:#e05a5a;
  --red-dim:#5c1e1e;
  --red-bg:#180808;
  --purple:#8b7ee8;
  --purple-dim:#2e2870;
  --purple-bg:#0e0c20;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}
body{display:flex;flex-direction:column;align-items:center;padding:32px 16px}

.portal{width:100%;max-width:1100px;border:1px solid var(--border);border-radius:14px;overflow:hidden}

/* HEADER */
.header{background:var(--surface);padding:20px 32px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:14px}
.logo-wrap img{height:40px;width:auto;display:block}
.header-divider{width:1px;height:32px;background:var(--border2)}
.portal-label{font-size:11px;color:var(--muted);letter-spacing:.05em}
.header-right{display:flex;align-items:center;gap:10px}
.live-pill{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:20px;background:var(--green-bg);border:1px solid var(--green-dim);color:var(--green)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.refresh-btn{background:var(--surface2);border:1px solid var(--border);color:var(--soft);font-size:11px;padding:6px 14px;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif;transition:border .15s,color .15s}
.refresh-btn:hover{border-color:var(--teal-dim);color:var(--teal-light)}

/* CLIENT BANNER */
.client-banner{background:var(--surface2);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.client-info{display:flex;align-items:center;gap:12px}
.client-avatar{width:36px;height:36px;border-radius:8px;background:var(--teal-bg);border:1px solid var(--teal-dim);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--teal-light);flex-shrink:0}
.client-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:600}
.client-meta{font-size:11px;color:var(--muted);margin-top:2px}
.contract-pill{font-size:10px;color:var(--teal-light);background:var(--teal-bg);border:1px solid var(--teal-dim);padding:3px 10px;border-radius:20px;white-space:nowrap}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(5,1fr);border-bottom:1px solid var(--border)}
.stat{padding:16px 20px;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-n{font-family:'Syne',sans-serif;font-size:24px;font-weight:600;line-height:1;margin-bottom:3px}
.stat-l{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}

/* TABLE */
.table-wrap{padding:24px 32px;overflow-x:auto}
.section-hd{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.section-hd::after{content:'';flex:1;height:1px;background:var(--border)}
table{width:100%;border-collapse:collapse;table-layout:fixed;min-width:580px}
thead tr{border-bottom:1px solid var(--border)}
thead th{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:0 14px 10px;text-align:left}
thead th:first-child{padding-left:0}
tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:14px 14px;font-size:12px;color:var(--text);vertical-align:top}
tbody td:first-child{padding-left:0}
.proj-name{font-size:13px;font-weight:500;margin-bottom:3px}
.proj-addr{font-size:11px;color:var(--muted);line-height:1.4}
.note-text{font-size:11px;color:var(--soft);line-height:1.5}
.note-empty{font-size:11px;color:var(--muted);font-style:italic}
.updated{font-size:10px;color:var(--muted);margin-top:4px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:20px;white-space:nowrap;margin-top:2px}
.badge::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.9}
.b-field{background:var(--teal-bg);color:var(--teal-light);border:1px solid var(--teal-dim)}
.b-processing{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-dim)}
.b-review{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-dim)}
.b-delivered{background:var(--green-bg);color:var(--green);border:1px solid var(--green-dim)}
.b-scheduled{background:var(--surface3);color:var(--soft);border:1px solid var(--border2)}
.b-hold{background:var(--red-bg);color:var(--red);border:1px solid var(--red-dim)}

/* REQUEST BUTTON */
.req-btn{display:inline-flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--border2);color:var(--soft);font-family:'Inter',sans-serif;font-size:10px;font-weight:500;padding:5px 11px;border-radius:7px;cursor:pointer;white-space:nowrap;transition:border .15s,color .15s,background .15s}
.req-btn:hover{border-color:var(--teal-dim);color:var(--teal-light);background:var(--teal-bg)}
.req-btn.sent{border-color:var(--green-dim);color:var(--green);background:var(--green-bg);cursor:default}

/* LOADING */
.loading{text-align:center;padding:64px 20px;color:var(--muted);font-size:13px}
.loading-spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--teal-light);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ERROR */
.error-msg{font-size:12px;color:var(--red);background:var(--red-bg);border:1px solid var(--red-dim);border-radius:8px;padding:12px 16px;margin:16px 32px}

/* EMPTY */
.no-data{text-align:center;padding:48px 20px;color:var(--muted);font-size:13px}

/* FOOTER */
.footer{background:var(--surface);padding:14px 32px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.footer-l{font-size:10px;color:var(--muted)}
.footer-logo{height:18px;width:auto;opacity:.35}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:28px;width:360px;max-width:92vw}
.modal-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;margin-bottom:6px}
.modal-proj{font-size:11px;color:var(--teal-light);background:var(--teal-bg);border:1px solid var(--teal-dim);padding:2px 8px;border-radius:5px;display:inline-block;margin-bottom:12px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.5}
.modal textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:10px 12px;resize:none;outline:none;height:88px;transition:border .15s}
.modal textarea:focus{border-color:var(--teal-dim)}
.modal-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.modal-cancel{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;padding:7px 16px;border-radius:7px;cursor:pointer}
.modal-send{background:var(--teal-bg);border:1px solid var(--teal-dim);color:var(--teal-light);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:7px 16px;border-radius:7px;cursor:pointer;transition:opacity .15s}
.modal-send:hover{opacity:.8}

@media(max-width:640px){
  .header,.client-banner,.table-wrap,.footer{padding-left:16px;padding-right:16px}
  .stats{grid-template-columns:repeat(3,1fr)}
  .stats .stat:nth-child(3){border-right:none}
  .stats .stat:nth-child(4),.stats .stat:nth-child(5){border-top:1px solid var(--border)}
}
</style>
</head>
<body>

<div class="portal">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="logo-wrap"><img id="logo" alt="Vista Geomatics" /></div>
      <div class="header-divider"></div>
      <div class="portal-label">Project Status Portal</div>
    </div>
    <div class="header-right">
      <span class="live-pill"><span class="live-dot"></span>Live</span>
      <button class="refresh-btn" onclick="loadSheet()">&#8635; Refresh</button>
    </div>
  </div>

  <!-- CLIENT BANNER -->
  <div class="client-banner">
    <div class="client-info">
      <div class="client-avatar">SH</div>
      <div>
        <div class="client-name">Shane Homes</div>
        <div class="client-meta" id="client-meta">Loading&hellip;</div>
      </div>
    </div>
    <span class="contract-pill">Active Contract</span>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-total">&ndash;</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n" id="s-field" style="color:var(--teal-light)">&ndash;</div><div class="stat-l">Field Work</div></div>
    <div class="stat"><div class="stat-n" id="s-proc"  style="color:var(--purple)">&ndash;</div><div class="stat-l">Processing</div></div>
    <div class="stat"><div class="stat-n" id="s-review" style="color:var(--amber)">&ndash;</div><div class="stat-l">In Review</div></div>
    <div class="stat"><div class="stat-n" id="s-done"  style="color:var(--green)">&ndash;</div><div class="stat-l">Delivered</div></div>
  </div>

  <!-- CONTENT -->
  <div class="table-wrap" id="table-wrap">
    <div class="section-hd">Survey projects</div>
    <div id="content-area">
      <div class="loading">
        <div class="loading-spinner"></div>
        Connecting to project data&hellip;
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span class="footer-l" id="last-updated">Not yet loaded</span>
    <img class="footer-logo" id="footer-logo" alt="Vista Geomatics" />
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Request a status update</div>
    <div class="modal-proj" id="modal-proj-name">&mdash;</div>
    <div class="modal-sub">Add a message or question for our team. We&rsquo;ll follow up with you shortly.</div>
    <textarea id="modal-msg" placeholder="e.g. Can you confirm the expected delivery date?"></textarea>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-send" onclick="sendRequest()">Send request</button>
    </div>
  </div>
</div>

// ── Badge helpers ────────────────────────────────────────────────────────────
function badgeClass(s) {
  const v = (s || '').toLowerCase();
  if (v.includes('field'))                                      return 'b-field';
  if (v.includes('process'))                                    return 'b-processing';
  if (v.includes('review'))                                     return 'b-review';
  if (v.includes('deliver') || v.includes('done') || v.includes('complet')) return 'b-delivered';
  if (v.includes('hold'))                                       return 'b-hold';
  return 'b-scheduled';
}

// ── CSV parser ────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return { headers: [], rows: [] };

  function splitLine(line) {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += line[i];
    }
    cols.push(cur.trim());
    return cols;
  }

  // Find the header row — look for a row containing "Project Name" or "Status"
  let headerIdx = 0;
  for (let i = 0; i < Math.min(lines.length, 6); i++) {
    const lower = lines[i].toLowerCase();
    if (lower.includes('project') || lower.includes('status')) { headerIdx = i; break; }
  }

  const headers = splitLine(lines[headerIdx]).map(h => h.toLowerCase().replace(/[^a-z]/g, ''));
  const fi = k => headers.findIndex(h => h.includes(k));
  const ni  = fi('project') !== -1 ? fi('project') : fi('name');
  const ai  = fi('address') !== -1 ? fi('address') : fi('addr');
  const si  = fi('status');
  const nti = fi('note');
  const di  = fi('updated') !== -1 ? fi('updated') : fi('date');

  const rows = [];
  for (let i = headerIdx + 1; i < lines.length; i++) {
    const cols = splitLine(lines[i]);
    const name = ni >= 0 ? cols[ni] : '';
    if (!name || !name.trim()) continue;
    rows.push({
      name:    name.trim(),
      address: ai  >= 0 ? (cols[ai]  || '').trim() : '',
      status:  si  >= 0 ? (cols[si]  || '').trim() : '',
      notes:   nti >= 0 ? (cols[nti] || '').trim() : '',
      updated: di  >= 0 ? (cols[di]  || '').trim() : '',
    });
  }
  return rows;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderProjects(rows) {
  let field = 0, proc = 0, rev = 0, done = 0;
  rows.forEach(r => {
    const v = (r.status || '').toLowerCase();
    if (v.includes('field'))                                          field++;
    else if (v.includes('process'))                                   proc++;
    else if (v.includes('review'))                                    rev++;
    else if (v.includes('deliver') || v.includes('done') || v.includes('complet')) done++;
  });

  document.getElementById('s-total').textContent  = rows.length;
  document.getElementById('s-field').textContent  = field;
  document.getElementById('s-proc').textContent   = proc;
  document.getElementById('s-review').textContent = rev;
  document.getElementById('s-done').textContent   = done;
  document.getElementById('client-meta').textContent = rows.length + ' active survey project' + (rows.length !== 1 ? 's' : '');

  if (rows.length === 0) {
    document.getElementById('content-area').innerHTML =
      '<div class="no-data">No projects found in the sheet. Add rows in the Shane Homes tab.</div>';
    return;
  }

  const table = document.createElement('table');
  table.innerHTML = `
    <colgroup>
      <col style="width:22%"><col style="width:20%"><col style="width:13%">
      <col style="width:30%"><col style="width:15%">
    </colgroup>
    <thead>
      <tr>
        <th>Project</th>
        <th>Address</th>
        <th>Status</th>
        <th>Notes</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="proj-tbody"></tbody>`;

  const tbody = table.querySelector('#proj-tbody');
  rows.forEach((p, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div class="proj-name">${esc(p.name)}</div>
      </td>
      <td>
        <div class="proj-addr">${p.address ? '&#128205; ' + esc(p.address) : '&mdash;'}</div>
      </td>
      <td>
        <span class="badge ${badgeClass(p.status)}">${esc(p.status) || 'Scheduled'}</span>
      </td>
      <td>
        <div class="${p.notes ? 'note-text' : 'note-empty'}">${esc(p.notes) || 'No notes'}</div>
        ${p.updated ? '<div class="updated">Updated ' + esc(p.updated) + '</div>' : ''}
      </td>
      <td>
        <button class="req-btn" id="btn-${i}" onclick="openModal(${i}, this, '${esc(p.name).replace(/'/g, "\\'")}')">
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 6h10M7 2l4 4-4 4"/></svg>
          Request update
        </button>
      </td>`;
    tbody.appendChild(tr);
  });

  document.getElementById('content-area').innerHTML = '';
  document.getElementById('content-area').appendChild(table);
  document.getElementById('last-updated').textContent =
    'Last updated · ' + new Date().toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Load sheet ────────────────────────────────────────────────────────────────
async function loadSheet() {
  const url = SHEET_CSV_URL.trim();
  if (!url) {
    document.getElementById('content-area').innerHTML = `
      <div class="error-msg">
        <strong>Setup required:</strong> Open this HTML file in a text editor, find the line
        <code style="background:rgba(255,255,255,.1);padding:1px 5px;border-radius:3px">const SHEET_CSV_URL = '';</code>
        and paste your published CSV URL between the quotes. Then save and reload.
      </div>
      <div style="padding:0 0 24px">
        <div class="no-data" style="padding:32px 20px">
          To get the CSV URL: open the Google Sheet &rarr; File &rarr; Share &rarr;
          Publish to web &rarr; select the <strong>Shane Homes</strong> tab &rarr;
          choose <strong>CSV</strong> &rarr; Publish &rarr; copy the URL.
        </div>
      </div>`;
    document.getElementById('s-total').textContent  = '–';
    document.getElementById('s-field').textContent  = '–';
    document.getElementById('s-proc').textContent   = '–';
    document.getElementById('s-review').textContent = '–';
    document.getElementById('s-done').textContent   = '–';
    document.getElementById('client-meta').textContent = 'Sheet URL not configured';
    return;
  }

  document.getElementById('content-area').innerHTML =
    '<div class="loading"><div class="loading-spinner"></div>Loading project data&hellip;</div>';

  try {
    const proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
    const res = await fetch(proxy);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    renderProjects(rows);
  } catch (e) {
    document.getElementById('content-area').innerHTML =
      `<div class="error-msg">&#9888; Could not load sheet: ${e.message}.<br>
       Check the CSV URL is correct and the sheet is still published.</div>`;
    document.getElementById('client-meta').textContent = 'Failed to load';
  }
}

// ── Modal ─────────────────────────────────────────────────────────────────────
let activeBtn = null;

function openModal(i, btn, projName) {
  activeBtn = btn;
  document.getElementById('modal-proj-name').textContent = projName;
  document.getElementById('modal-msg').value = '';
  document.getElementById('modal').classList.add('show');
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
  activeBtn = null;
}
function sendRequest() {
  if (!activeBtn) return;
  activeBtn.classList.add('sent');
  activeBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6l3 3 5-5"/></svg> Sent';
  activeBtn.onclick = null;
  closeModal();
}
document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });

// ── Auto-load on open ─────────────────────────────────────────────────────────
loadSheet();
</script>
