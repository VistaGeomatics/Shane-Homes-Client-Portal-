<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shane Homes - Project Status | Vista Geomatics</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d10;--surface:#111520;--surface2:#151c25;--surface3:#1a2230;
  --border:#1e2a38;--border2:#253347;
  --text:#dde6f0;--muted:#4a5d72;--soft:#7a90a8;
  --teal:#2e8fa3;--teal-dim:#16444f;--teal-bg:#091418;--teal-light:#3ab0c8;
  --green:#3db87a;--green-dim:#0e4830;--green-bg:#061a10;
  --amber:#e8a83d;--amber-dim:#6b4a10;--amber-bg:#1a1005;
  --red:#e05a5a;--red-dim:#5c1e1e;--red-bg:#180808;
  --purple:#8b7ee8;--purple-dim:#2e2870;--purple-bg:#0e0c20;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}
body{display:flex;flex-direction:column;align-items:center;padding:24px 16px}
.portal{width:100%;max-width:1240px;border:1px solid var(--border);border-radius:14px;overflow:hidden}
.header{background:var(--surface);padding:18px 28px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:14px}
.logo-wrap img{height:40px;width:auto;display:block}
.header-divider{width:1px;height:30px;background:var(--border2)}
.portal-label{font-size:11px;color:var(--muted);letter-spacing:.05em}
.live-pill{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:4px 11px;border-radius:20px;background:var(--green-bg);border:1px solid var(--green-dim);color:var(--green)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.refresh-btn{background:var(--surface2);border:1px solid var(--border);color:var(--soft);font-size:11px;padding:5px 13px;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif;transition:border .15s,color .15s}
.refresh-btn:hover{border-color:var(--teal-dim);color:var(--teal-light)}
.client-banner{background:var(--surface2);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.client-info{display:flex;align-items:center;gap:10px}
.client-avatar{width:34px;height:34px;border-radius:8px;background:var(--teal-bg);border:1px solid var(--teal-dim);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--teal-light);flex-shrink:0}
.client-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:600}
.client-sub{font-size:11px;color:var(--muted);margin-top:1px}
.contract-pill{font-size:10px;color:var(--teal-light);background:var(--teal-bg);border:1px solid var(--teal-dim);padding:3px 10px;border-radius:20px;white-space:nowrap}
.project-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:stretch;overflow-x:auto;gap:0;scrollbar-width:thin}
.nav-tab{display:flex;align-items:center;gap:7px;padding:13px 18px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif}
.nav-tab:hover{color:var(--soft)}
.nav-tab.active{color:var(--teal-light);border-bottom-color:var(--teal-light)}
.tab-count{font-size:10px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:1px 6px;border-radius:10px;line-height:1.4;transition:all .15s}
.nav-tab.active .tab-count{background:var(--teal-bg);border-color:var(--teal-dim);color:var(--teal-light)}
.stats{display:flex;border-bottom:1px solid var(--border)}
.stat{padding:14px 20px;border-right:1px solid var(--border);flex:1}
.stat:last-child{border-right:none}
.stat-n{font-family:'Syne',sans-serif;font-size:22px;font-weight:600;line-height:1;margin-bottom:3px}
.stat-l{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);white-space:nowrap}
.table-wrap{padding:24px 28px;overflow-x:auto}
.section-hd{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-hd::after{content:'';flex:1;height:1px;background:var(--border)}
table{width:100%;border-collapse:collapse;min-width:960px}
thead tr{border-bottom:1px solid var(--border)}
thead th{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:0 12px 11px;text-align:left;white-space:nowrap}
thead th:first-child{padding-left:0}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:14px 12px;font-size:12px;vertical-align:top}
tbody td:first-child{padding-left:0}
.app-type{font-size:12px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:3px}
.app-num{font-size:10px;color:var(--teal-light);font-family:monospace;background:var(--teal-bg);border:1px solid var(--teal-dim);padding:1px 6px;border-radius:4px;display:inline-block;margin-top:3px}
.note-text{font-size:11px;color:var(--soft);line-height:1.6}
.note-na{font-size:11px;color:var(--muted);font-style:italic}
.consent-comment{font-size:10px;color:var(--muted);margin-top:5px;line-height:1.5;font-style:italic}
.plan-num{font-size:11px;font-family:monospace;color:var(--soft)}
.updated-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);margin-top:6px;background:var(--surface3);border:1px solid var(--border);padding:2px 7px;border-radius:4px}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:20px;white-space:nowrap;line-height:1.5}
.badge::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0}
.s-pre        {background:#0c1a3a;color:#60a5fa;border:1px solid #1e3a6e}
.s-apppending {background:#1c1500;color:#fbbf24;border:1px solid #6b4a10}
.s-approved   {background:#052e1f;color:#34d399;border:1px solid #0a5035}
.s-endpending {background:#1a0f00;color:#fb923c;border:1px solid #7c3005}
.s-endorsed   {background:#051a18;color:#2dd4bf;border:1px solid #0d5050}
.s-landtitles {background:#100c28;color:#a78bfa;border:1px solid #3b35a0}
.s-registered {background:#031a0e;color:#4ade80;border:1px solid #065f2e}
.s-onhold     {background:#180808;color:#f87171;border:1px solid #6b1414}
.s-enmax      {background:#1a0e00;color:#fdba74;border:1px solid #7c3a05}
.c-notprepared{background:var(--surface3);color:var(--soft);border:1px solid var(--border2)}
.c-inprep     {background:#1c1500;color:#fcd34d;border:1px solid #6b4a10}
.c-na         {background:var(--surface3);color:var(--muted);border:1px solid var(--border)}
.c-awaiting   {background:#0c1428;color:#93c5fd;border:1px solid #1e3a6e}
.c-complete   {background:#052e1f;color:#34d399;border:1px solid #0a5035}
.c-received   {background:#100c28;color:#c4b5fd;border:1px solid #3b35a0}
.req-btn{display:inline-flex;align-items:center;gap:4px;background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:'Inter',sans-serif;font-size:9px;font-weight:500;padding:4px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:all .15s}
.req-btn:hover{border-color:var(--teal-dim);color:var(--teal-light);background:var(--teal-bg)}
.req-btn.sent{border-color:var(--green-dim);color:var(--green);background:var(--green-bg);cursor:default}
.loading{text-align:center;padding:64px 20px;color:var(--muted);font-size:13px}
.loading-spinner{width:26px;height:26px;border:2px solid var(--border2);border-top-color:var(--teal-light);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{margin:20px 28px;background:var(--surface2);border-left:3px solid var(--red);border-radius:8px;padding:16px 20px}
.error-box h3{font-size:13px;font-weight:600;color:var(--red);margin-bottom:8px}
.error-box p{font-size:12px;color:var(--soft);line-height:1.7;margin-bottom:4px}
.error-box strong{color:var(--text);font-weight:500}
.no-data{text-align:center;padding:48px 20px;color:var(--muted);font-size:13px}
.footer{background:var(--surface);padding:12px 28px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.footer-l{font-size:10px;color:var(--muted)}
.footer-logo{height:20px;width:auto}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:26px;width:400px;max-width:92vw}
.modal-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;margin-bottom:6px}
.modal-context{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;margin-bottom:14px}
.modal-context-row{display:flex;gap:8px;font-size:11px;margin-bottom:4px;align-items:baseline}
.modal-context-row:last-child{margin-bottom:0}
.ctx-label{color:var(--muted);min-width:72px;flex-shrink:0}
.ctx-val{color:var(--text);font-weight:500}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.modal-name-wrap{margin-bottom:12px}
.modal-name-wrap label{font-size:11px;color:var(--muted);display:block;margin-bottom:5px}
.modal-name-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:8px 12px;outline:none;transition:border .15s}
.modal-name-wrap input:focus{border-color:var(--teal-dim)}
.modal textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:10px 12px;resize:none;outline:none;height:90px;transition:border .15s}
.modal textarea:focus{border-color:var(--teal-dim)}
.modal-actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.modal-cancel{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;padding:7px 16px;border-radius:7px;cursor:pointer}
.modal-send{background:var(--teal-bg);border:1px solid var(--teal-dim);color:var(--teal-light);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:7px 16px;border-radius:7px;cursor:pointer;transition:opacity .15s}
.modal-send:hover{opacity:.8}
.modal-sent-state{text-align:center;padding:16px 0 4px}
.modal-sent-icon{font-size:28px;margin-bottom:8px}
.modal-sent-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;color:var(--green);margin-bottom:6px}
.modal-sent-sub{font-size:12px;color:var(--muted);line-height:1.6}
@media(max-width:700px){
  .header,.client-banner,.project-nav,.table-wrap,.footer{padding-left:14px;padding-right:14px}
  .stats{flex-wrap:wrap}
  .stat{min-width:33%}
}
</style>
</head>
<body>
<div class="portal">
  <div class="header">
    <div class="header-left">
      <div class="logo-wrap"><img id="logo" alt="Vista Geomatics"/></div>
      <div class="header-divider"></div>
      <div class="portal-label">Project Status Portal</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="live-pill"><span class="live-dot"></span>Live</span>
      <button class="refresh-btn" onclick="refreshCurrent()">&#8635; Refresh</button>
    </div>
  </div>
  <div class="client-banner">
    <div class="client-info">
      <div class="client-avatar">SH</div>
      <div>
        <div class="client-name">Shane Homes</div>
        <div class="client-sub">Vista Geomatics Ltd. &mdash; Active Contract</div>
      </div>
    </div>
    <span class="contract-pill">Active Contract</span>
  </div>
  <nav class="project-nav" id="project-nav"></nav>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-total">&ndash;</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n" id="s-registered" style="color:#4ade80">&ndash;</div><div class="stat-l">Registered</div></div>
    <div class="stat"><div class="stat-n" id="s-endorsed" style="color:#2dd4bf">&ndash;</div><div class="stat-l">Endorsed</div></div>
    <div class="stat"><div class="stat-n" id="s-pending" style="color:#fb923c">&ndash;</div><div class="stat-l">Pending</div></div>
    <div class="stat"><div class="stat-n" id="s-pre" style="color:#60a5fa">&ndash;</div><div class="stat-l">Pre-App</div></div>
    <div class="stat"><div class="stat-n" id="s-hold" style="color:#f87171">&ndash;</div><div class="stat-l">On Hold</div></div>
  </div>
  <div id="main-content">
    <div class="loading"><div class="loading-spinner"></div>Loading project data&hellip;</div>
  </div>
  <div class="footer">
    <span class="footer-l" id="last-updated">Not yet loaded</span>
    <img class="footer-logo" id="footer-logo" alt="Vista Geomatics"/>
  </div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div id="modal-form-state">
      <div class="modal-title">Request a status update</div>
      <div class="modal-context" id="modal-context"></div>
      <div class="modal-name-wrap">
        <label>Your name</label>
        <input type="text" id="modal-sender" placeholder="e.g. David Thompson"/>
      </div>
      <div class="modal-sub">Your message to the Vista Geomatics team:</div>
      <textarea id="modal-msg" placeholder="e.g. Can you confirm when the endorsement sign-off is expected?"></textarea>
      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-send" onclick="sendRequest()">Send to Vista Geomatics</button>
      </div>
    </div>
    <div id="modal-sent-state" style="display:none">
      <div class="modal-sent-state">
        <div class="modal-sent-icon">&#10003;</div>
        <div class="modal-sent-title">Request sent</div>
        <div class="modal-sent-sub" id="modal-sent-sub"></div>
      </div>
      <div class="modal-actions" style="justify-content:center;margin-top:20px">
        <button class="modal-cancel" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>
</div>

  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function isBlank(s) {
    return !s || s.trim()==='' || s.trim().toLowerCase()==='n/a';
  }

  function statusClass(s) {
    var v = (s||'').toLowerCase().trim();
    if (v === 'pre-application' || v.indexOf('pre-app') === 0) return 's-pre';
    if (v.indexOf('application c') !== -1)                     return 's-apppending';
    if (v === 'approved')                                       return 's-approved';
    if (v.indexOf('endorsement c') !== -1)                     return 's-endpending';
    if (v === 'endorsed')                                       return 's-endorsed';
    if (v.indexOf('land title') !== -1 || v.charAt(0) === '@') return 's-landtitles';
    if (v.indexOf('register') !== -1)                          return 's-registered';
    if (v.indexOf('on hold') !== -1)                           return 's-onhold';
    if (v.indexOf('enmax') !== -1)                             return 's-enmax';
    return 's-pre';
  }

  function consentClass(s) {
    var v = (s||'').toLowerCase().trim();
    if (v.indexOf('not prep') !== -1) return 'c-notprepared';
    if (v.indexOf('in prep') !== -1)  return 'c-inprep';
    if (v === 'n/a')                  return 'c-na';
    if (v.indexOf('await') !== -1)    return 'c-awaiting';
    if (v.indexOf('complet') !== -1)  return 'c-complete';
    if (v.indexOf('receiv') !== -1)   return 'c-received';
    return 'c-na';
  }

  function splitLines(text) {
    var result = [];
    var current = '';
    for (var i = 0; i < text.length; i++) {
      var ch = text.charAt(i);
      if (ch === '\r') {
        result.push(current);
        current = '';
        if (i + 1 < text.length && text.charAt(i + 1) === '\n') i++;
      } else if (ch === '\n') {
        result.push(current);
        current = '';
      } else {
        current += ch;
      }
    }
    if (current.length > 0) result.push(current);
    return result;
  }

  function parseLine(line) {
    var cols = [];
    var cur = '';
    var inQ = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line.charAt(i);
      if (ch === '"') {
        if (inQ && i + 1 < line.length && line.charAt(i + 1) === '"') {
          cur += '"'; i++;
        } else {
          inQ = !inQ;
        }
      } else if (ch === ',' && !inQ) {
        cols.push(cur.trim());
        cur = '';
      } else {
        cur += ch;
      }
    }
    cols.push(cur.trim());
    return cols;
  }

  function parseCSV(raw) {
    var lines = splitLines(raw.trim());
    var hi = -1;
    for (var i = 0; i < Math.min(lines.length, 8); i++) {
      var cells = parseLine(lines[i]);
      var hasApp = false, hasSt = false;
      for (var c = 0; c < cells.length; c++) {
        var cv = cells[c].toLowerCase().trim();
        if (cv === 'application type' || cv === 'application type ') hasApp = true;
        if (cv === 'status') hasSt = true;
      }
      if (hasApp && hasSt) { hi = i; break; }
    }
    if (hi === -1) return [];

    var headers = parseLine(lines[hi]);
    for (var h = 0; h < headers.length; h++) headers[h] = headers[h].toLowerCase().trim();

    function fi() {
      for (var a = 0; a < arguments.length; a++) {
        var key = arguments[a];
        for (var j = 0; j < headers.length; j++) {
          if (headers[j] === key || headers[j] === key + ' ' || headers[j].indexOf(key) === 0) return j;
        }
      }
      return -1;
    }

    var ai  = fi('application type');
    var ani = fi('application number');
    var si  = fi('status');
    var ni  = fi('notes');
    var ci  = fi('consents');
    var cci = fi('consent comments');
    var pi  = fi('registered plan');
    var di  = fi('last updated');

    var rows = [];
    for (var r = hi + 1; r < lines.length; r++) {
      var cols = parseLine(lines[r]);
      var appType = ai >= 0 ? (cols[ai] || '').trim() : '';
      if (!appType) continue;
      var lo = appType.toLowerCase();
      if (lo.indexOf('update cells') !== -1 || lo.indexOf('vista geomatics') !== -1 || lo.indexOf('publish via') !== -1) continue;
      rows.push({
        appType : appType,
        appNum  : ani >= 0 ? (cols[ani] || '').trim() : '',
        status  : si  >= 0 ? (cols[si]  || '').trim() : '',
        notes   : ni  >= 0 ? (cols[ni]  || '').trim() : '',
        consents: ci  >= 0 ? (cols[ci]  || '').trim() : '',
        consentComments: cci >= 0 ? (cols[cci] || '').trim() : '',
        planNum : pi  >= 0 ? (cols[pi]  || '').trim() : '',
        updated : di  >= 0 ? (cols[di]  || '').trim() : ''
      });
    }
    return rows;
  }

  function updateStats(rows) {
    var reg = 0, end = 0, pend = 0, pre = 0, hold = 0;
    for (var i = 0; i < rows.length; i++) {
      var v = (rows[i].status || '').toLowerCase().trim();
      if      (v.indexOf('register') !== -1)                               reg++;
      else if (v === 'endorsed')                                            end++;
      else if (v.indexOf('on hold') !== -1)                                hold++;
      else if (v === 'pre-application' || v.indexOf('pre-app') === 0)      pre++;
      else                                                                  pend++;
    }
    document.getElementById('s-total').textContent      = rows.length;
    document.getElementById('s-registered').textContent = reg;
    document.getElementById('s-endorsed').textContent   = end;
    document.getElementById('s-pending').textContent    = pend;
    document.getElementById('s-pre').textContent        = pre;
    document.getElementById('s-hold').textContent       = hold;
  }

  function renderTable(rows, projectName) {

      document.getElementById('main-content').innerHTML =

        + '</tr>';
    }
    document.getElementById('main-content').innerHTML =
      '<div class="table-wrap">'
      + '<div class="section-hd">' + esc(projectName) + ' &mdash; Applications</div>'
      + '<table><thead><tr>'
      + '<th>Application Type</th><th>Status</th><th>Notes</th><th>Consents</th><th>Plan Number</th><th></th>'
      + '</tr></thead><tbody>' + tbody + '</tbody></table>'

    document.getElementById('last-updated').textContent =

  function loadProject(name, force) {
    activeProject = name;

      tabs[i].classList.toggle('active', tabs[i].dataset.project === name);
    }
    if (!force && cache[name]) { renderTable(cache[name], name); return; }

    document.getElementById('main-content').innerHTML =

    var statIds = ['s-total','s-registered','s-endorsed','s-pending','s-pre','s-hold'];

    var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID
      + '/gviz/tq?tqx=out:csv&sheet=' + encodeURIComponent(name);

    fetch(url)

        if (res.status === 401 || res.status === 403) throw new Error('ACCESS_DENIED');
        if (!res.ok) throw new Error('HTTP ' + res.status);

        console.log('[Portal Debug] Total CSV length:', text.length);
        var rows = parseCSV(text);
        console.log('[Portal Debug] Parsed rows:', rows.length, rows);
        cache[name] = rows;
        renderTable(rows, name);
        var tab = document.querySelector('.nav-tab[data-project="' + name + '"]');
        if (tab) { var cnt = tab.querySelector('.tab-count'); if (cnt) cnt.textContent = rows.length; }
      })
      .catch(function(e) {
        var denied = e.message.indexOf('ACCESS_DENIED') !== -1;
        document.getElementById('main-content').innerHTML = denied
          ? '<div class="error-box"><h3>&#128274; Sheet access required</h3>'
            + '<p>Open the Google Sheet &rarr; <strong>Share</strong> &rarr; set General access to '
            + '<strong>Anyone with the link &rarr; Viewer</strong> &rarr; click <strong>Done</strong>, then Refresh.</p></div>'
          : '<div class="error-box"><h3>&#9888; Could not load ' + esc(name) + '</h3>'
            + '<p style="font-family:monospace;font-size:11px">' + esc(e.message) + '</p></div>';
      });
  }

  function refreshCurrent() { delete cache[activeProject]; loadProject(activeProject, true); }

  function buildNav() {
    var nav = document.getElementById('project-nav');
    for (var i = 0; i < PROJECTS.length; i++) {
      (function(name, idx) {
        var btn = document.createElement('button');
        btn.className = 'nav-tab' + (idx === 0 ? ' active' : '');
        btn.dataset.project = name;
        btn.innerHTML = esc(name) + ' <span class="tab-count">&mdash;</span>';
        btn.addEventListener('click', function() { loadProject(name); });
        nav.appendChild(btn);
      })(PROJECTS[i], i);
    }
  }

  window._openModal = function(rowIdx) {
    var rows = window._currentRows || [];
    var r = rows[rowIdx];
    if (!r) return;
    activeRowData = r;
    var ctx = '<div class="modal-context-row"><span class="ctx-label">Project</span><span class="ctx-val">' + esc(activeProject) + '</span></div>'
      + '<div class="modal-context-row"><span class="ctx-label">Application</span><span class="ctx-val">' + esc(r.appType) + '</span></div>'
      + (!isBlank(r.appNum) ? '<div class="modal-context-row"><span class="ctx-label">App. No.</span><span class="ctx-val" style="font-family:monospace;color:var(--teal-light)">' + esc(r.appNum) + '</span></div>' : '')
      + '<div class="modal-context-row"><span class="ctx-label">Status</span><span class="badge ' + statusClass(r.status) + '" style="font-size:9px">' + esc(r.status) + '</span></div>'
      + (!isBlank(r.updated) ? '<div class="modal-context-row"><span class="ctx-label">Last updated</span><span class="ctx-val">' + esc(r.updated) + '</span></div>' : '');
    document.getElementById('modal-context').innerHTML = ctx;
    document.getElementById('modal-form-state').style.display = '';
    document.getElementById('modal-sent-state').style.display = 'none';
    document.getElementById('modal-msg').value = '';
    document.getElementById('modal').classList.add('show');
    setTimeout(function() { document.getElementById('modal-sender').focus(); }, 100);
  };

  window.closeModal = function() {
    document.getElementById('modal').classList.remove('show');
    activeRowData = null;
  };

  window.sendRequest = function() {
    var r = activeRowData;
    var sender  = document.getElementById('modal-sender').value.trim();
    var message = document.getElementById('modal-msg').value.trim();
    if (!message) { document.getElementById('modal-msg').focus(); return; }
    var lines = [
      'Update request from: ' + (sender || 'Shane Homes (portal)'),
      '',
      'Project: ' + activeProject,
      'Application Type: ' + r.appType
    ];
    if (!isBlank(r.appNum))  lines.push('Application Number: ' + r.appNum);
    lines.push('Current Status: ' + r.status);
    if (!isBlank(r.updated)) lines.push('Last Updated: ' + r.updated);
    lines.push('', 'Message:', message, '', '---', 'Sent via Vista Geomatics Client Portal');
    var subject = 'Status Update Request - Shane Homes / ' + activeProject + ' / ' + r.appType;
    window.location.href = 'mailto:' + CE + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(lines.join('\n'));
    document.getElementById('modal-form-state').style.display = 'none';
    document.getElementById('modal-sent-state').style.display = '';
    var btns = document.querySelectorAll('.req-btn');
    for (var b = 0; b < btns.length; b++) {
      var row = btns[b].closest('tr');
      if (row && row.querySelector('.app-type') && row.querySelector('.app-type').textContent === r.appType) {
        btns[b].classList.add('sent');
        btns[b].innerHTML = '<svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6l3 3 5-5"/></svg> Sent';
        btns[b].onclick = null;
      }
    }
  };

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === document.getElementById('modal')) window.closeModal();
  });

  window.refreshCurrent = refreshCurrent;
  buildNav();
  loadProject(PROJECTS[0]);
})();

</script>
</body>
</html>
